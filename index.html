<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo a Week</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bungee&family=Caveat:wght@600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">

  <!-- PWA: installable to home screen -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#d98aa0">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Photo a Week">
  <meta name="mobile-web-app-capable" content="yes">
</head>
<body data-theme="coquette">

  <!-- ===== TOP NAV ===== -->
  <nav class="topbar">
    <div class="brand">
      <span class="brand-mark">✦</span>
      <span class="brand-name">Photo a Week</span>
    </div>

    <div class="nav-center">
      <button id="prevMonth" class="icon-btn" title="Previous month" aria-label="Previous month">‹</button>
      <select id="monthSelect" class="month-select" aria-label="Choose month"></select>
      <button id="nextMonth" class="icon-btn" title="Next month" aria-label="Next month">›</button>
    </div>

    <div class="nav-actions">
      <div class="themes" id="themes">
        <button class="swatch" data-theme="coquette" title="Coquette"></button>
        <button class="swatch" data-theme="matcha"   title="Matcha"></button>
        <button class="swatch" data-theme="butter"   title="Butter"></button>
        <button class="swatch" data-theme="peach"    title="Peach"></button>
        <button class="swatch" data-theme="midnight" title="Midnight"></button>
        <button class="swatch" data-theme="paper"    title="Paper (white)"></button>
      </div>
      <button id="downloadBtn" class="pill-btn subtle" title="Save this month as an image">⬇ Save</button>
      <button id="diaryBtn" class="pill-btn" title="Flip through your diary">📖 Diary</button>
      <button id="authSignOut" class="pill-btn subtle" title="Sign out" hidden>Sign out</button>
    </div>
  </nav>

  <!-- ===== ADD BAR ===== -->
  <section class="addbar" id="addbar">
    <input type="text" id="captionInput" class="field grow" placeholder="Write a note for this week…" maxlength="80">
    <input type="text" id="songInput" class="field song-field" placeholder="🎵 song of the week (optional)" maxlength="60">
    <label class="pill-btn accent">
      + Add photo
      <input type="file" id="fileInput" accept="image/*" hidden>
    </label>
    <button id="monthNoteBtn" class="pill-btn subtle" title="Add a note for the month">☁ Month note</button>
    <button id="bellBtn" class="pill-btn subtle" title="Weekly reminders">🔔</button>
  </section>

  <div id="reminder" class="reminder"></div>
  <div id="status" class="status"></div>

  <!-- ===== BOARD ===== -->
  <main id="gallery" class="gallery"></main>

  <!-- ===== MONTH-NOTE PANEL ===== -->
  <div class="panel-scrim" id="notePanel" hidden>
    <div class="panel">
      <h3 id="notePanelTitle">A note for this month</h3>
      <p class="panel-sub">One line about how the month felt. It floats on the calendar as a little cloud.</p>
      <textarea id="noteText" maxlength="120" rows="3" placeholder="e.g. slow mornings, long walks, felt like myself again"></textarea>
      <div class="panel-actions">
        <button id="noteCancel" class="pill-btn subtle">Cancel</button>
        <button id="noteSave" class="pill-btn accent">Add note</button>
      </div>
    </div>
  </div>

  <!-- ===== ONBOARDING (filled by JS) ===== -->
  <div class="onboard-scrim" id="onboard" hidden>
    <div class="onboard-card" id="onboardCard"></div>
  </div>

  <!-- ===== LOGIN GATE ===== -->
  <div class="auth-scrim" id="authScrim" hidden>
    <div class="auth-card">
      <div class="onboard-mark">✦</div>
      <h2 id="authTitle">Welcome back</h2>
      <p class="onboard-lead">Log in to see your diary on any device.</p>
      <input type="email" id="authEmail" class="ob-input" placeholder="Email" autocomplete="email">
      <input type="password" id="authPassword" class="ob-input" placeholder="Password (6+ characters)" autocomplete="current-password">
      <div id="authError" class="auth-error"></div>
      <button id="authSubmit" class="pill-btn accent big">Log in</button>
      <p class="auth-toggle" id="authToggle"></p>
    </div>
  </div>

  <!-- ===== CONFIRM DIALOG ===== -->
  <div class="panel-scrim" id="confirmPanel" hidden>
    <div class="panel confirm">
      <h3 id="confirmTitle">Remove this?</h3>
      <p class="panel-sub" id="confirmText">This can't be undone.</p>
      <div class="panel-actions">
        <button id="confirmCancel" class="pill-btn subtle">Keep it</button>
        <button id="confirmOk" class="pill-btn accent">Remove</button>
      </div>
    </div>
  </div>

  <!-- ===== TOAST ===== -->
  <div id="toast" class="toast" hidden></div>

  <!-- html2canvas for "save as image" -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <!-- Supabase client + connection -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <!-- app files, loaded in order -->
  <script src="js/storage.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>

  <!-- register the service worker so the app can be installed -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('service-worker.js').catch(function () {});
      });
    }
  </script>
</body>
</html>
